<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Bot — Starting Up</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    text-align: center;
    padding: 60px 80px;
    background: #111827;
    border: 1px solid #1e293b;
    border-radius: 16px;
    max-width: 540px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  p { color: #64748b; font-size: 15px; line-height: 1.7; }
  .badge {
    display: inline-block;
    margin-top: 24px;
    padding: 8px 20px;
    background: #0f172a;
    border: 1px solid #1e3a5f;
    border-radius: 999px;
    color: #60a5fa;
    font-size: 13px;
    font-weight: 600;
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #34d399;
    margin-right: 8px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>Polymarket Copy-Trading Bot</h1>
  <p>Forward-only paper trading simulation. Starting from zero — no backtest, no fake history.<br><br>
  The first dashboard will appear after the bot's next scheduled run (every 2 hours).</p>
  <div class="badge"><span class="dot"></span>Waiting for first forward cycle&hellip;</div>
</div>
</body>
</html>
